<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교차로 신호 안내 앱</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
    }

    body {
      margin: 0;
      background: #f2f7ff;
      color: #222;
    }

    .app {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background: white;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #1d5cff;
    }

    .header p {
      font-size: 14px;
      color: #666;
    }

    .card {
      background: #f8fbff;
      border: 1px solid #dce8ff;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
    }

    .label {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    select, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      margin-top: 14px;
      border: none;
      background: #1d5cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .signal-box {
      text-align: center;
    }

    .signal {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: 16px auto;
      background: #22c55e;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }

    .time {
      font-size: 34px;
      font-weight: bold;
      color: #1d5cff;
      margin: 10px 0;
    }

    .route {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 12px;
    }

    .route div {
      flex: 1;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 6px;
      text-align: center;
      font-size: 13px;
    }

    .active {
      border: 2px solid #1d5cff !important;
      background: #eaf1ff !important;
      font-weight: bold;
    }

    .notice {
      font-size: 14px;
      line-height: 1.6;
      color: #444;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h1>🚦 신호 길잡이</h1>
      <p>보행자를 위한 교차로 신호 안내 앱</p>
    </div>

    <div class="card">
      <div class="label">현재 이용할 교차로를 선택하세요</div>
      <select id="crossroad">
        <option>중앙 사거리</option>
        <option>학교 앞 오거리</option>
        <option>버스정류장 앞 교차로</option>
      </select>

      <button onclick="startGuide()">신호 안내 시작하기</button>
    </div>

    <div class="card signal-box" id="result">
      <h3>현재 횡단 가능 방향</h3>
      <div class="signal">GREEN</div>
      <p>현재 건널 수 있는 방향</p>
      <h2 id="direction">동쪽 횡단보도</h2>

      <p>다음 신호까지 남은 시간</p>
      <div class="time" id="timer">25초</div>
    </div>

    <div class="card">
      <h3>다음 신호 순서</h3>
      <div class="route">
        <div class="active">1<br>동쪽</div>
        <div>2<br>북쪽</div>
        <div>3<br>서쪽</div>
        <div>4<br>남쪽</div>
      </div>
    </div>

    <div class="card notice">
      <b>안내</b><br>
      이 앱은 보행자가 복잡한 교차로에서 신호 흐름을 쉽게 파악하고,
      불필요한 대기 시간과 답답함을 줄일 수 있도록 돕는 프로토타입입니다.
    </div>

    <div class="footer">
      별하늘 팀 디자인씽킹 프로젝트
    </div>
  </div>

  <script>
    let time = 25;
    let directions = ["동쪽 횡단보도", "북쪽 횡단보도", "서쪽 횡단보도", "남쪽 횡단보도"];
    let index = 0;
    let timerInterval;

    function startGuide() {
      clearInterval(timerInterval);
      time = 25;
      index = 0;
      updateScreen();

      timerInterval = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = time + "초";

        if (time <= 0) {
          time = 25;
          index = (index + 1) % directions.length;
          updateScreen();
        }
      }, 1000);
    }

    function updateScreen() {
      document.getElementById("direction").innerText = directions[index];
      document.getElementById("timer").innerText = time + "초";

      const routeItems = document.querySelectorAll(".route div");
      routeItems.forEach((item, i) => {
        item.classList.toggle("active", i === index);
      });
    }
  </script>
</body>
</html>
